default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: 'extern/.*'
repos:
# ── Ruff: linter + formatter (mirrors scripts/lint.sh) ──────────────
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.10
  hooks:
  - id: ruff-check
    args: [--fix]
  - id: ruff-format

# ── Local hooks ──────────────────────────────────────────────────────
- repo: local
  hooks:
  - id: shellcheck
    name: shellcheck
    entry: shellcheck
    language: system
    types: [shell]

  - id: mypy
    name: mypy
    entry: mypy vllm_metal
    language: system
    types: [python]
    pass_filenames: false
    require_serial: true

  - id: signoff-commit
    name: signoff-commit
    entry: bash
    args:
      - -c
      - |
        if ! grep -q "^Signed-off-by: $(git config user.name) <$(git config user.email)>" "$(git rev-parse --git-path COMMIT_EDITMSG)"; then
          printf "\nSigned-off-by: $(git config user.name) <$(git config user.email)>\n" >> "$(git rev-parse --git-path COMMIT_EDITMSG)"
        fi
    language: system
    stages: [commit-msg]
    verbose: true
